site_name: Eduardo Furlan
site_author: Eduardo Furlan
copyright: CC BY 4.0 License
repo_name: efurlanm/
repo_url: http://github.com/efurlanm/
docs_dir: docs-src
site_dir: docs
site_url: ""
use_directory_urls: false
theme:
    name: material
    font: false
# https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/
    palette:
        primary: blue grey
        accent: blue grey
    features:
        - header.autohide
        #- navigation.sections
plugins:
    - blog:
        post_readtime: false
    - tags:
        tags_file: blog/tags.md
    - search
markdown_extensions:
    - pymdownx.arithmatex:
        generic: true
    - def_list
    - md_in_html
    - tables
extra_javascript:
    - javascripts/katex/katex.min.js
    - javascripts/katex/contrib/auto-render.min.js
    - javascripts/katex.js
    - javascripts/mermaid/mermaid.min.js
extra_css:
    - javascripts/katex/katex.min.css
    - css/extra.css
exclude_docs: |
    .ipynb_checkpoints
    .git
# Se usar nav fica tudo manual incluindo menus/indices do blog
#nav:
    #- About me: index.md
    #- My research: research.md
    #- My MSc work: msc.md
    #- Links: links.md
    #- Repositories: repo.md
    #- Teaching: teach.md
    #- Zotero: zotero.md
    #- Blog: blog/index.md
