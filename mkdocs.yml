site_name: Eduardo Furlan
site_author: Eduardo Furlan
copyright: CC BY 4.0 License
repo_name: efurlanm/
repo_url: http://github.com/efurlanm/
docs_dir: docs-src
site_dir: docs
# Add a link tag with the canonical URL to the head section of each HTML page
#site_url: "" 
# Additional e.g. "index.html" to the URL
#use_directory_urls: false
theme:
    name: material
# https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/
    palette:
        primary: blue grey
        accent: blue grey
    features:
        - header.autohide
plugins:
    - offline
    - privacy
    - search
    - blog:
        post_readtime: false
#    - tags:
#        tags_file: blog/tags.md
markdown_extensions:
    - pymdownx.arithmatex:
        generic: true
    - pymdownx.superfences:
        custom_fences:
            - name: mermaid
              class: mermaid
              format: !!python/name:pymdownx.superfences.fence_code_format
    - pymdownx.highlight:
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - def_list
    - md_in_html
    - tables
extra_javascript:
    - javascripts/katex.js
    - javascripts/katex/katex.min.js
    - javascripts/katex/contrib/auto-render.min.js
extra_css:
    - javascripts/katex/katex.min.css
    - css/extra.css
exclude_docs: |
    .ipynb_checkpoints
    .git
