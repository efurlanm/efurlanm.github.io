site_name: Eduardo Furlan
site_author: Eduardo Furlan
copyright: CC BY 4.0 License
repo_name: efurlanm
repo_url: http://github.com/efurlanm/
docs_dir: docs-src
site_dir: docs
theme:
    name: material
    # squidfunk.github.io/mkdocs-material/setup/changing-the-colors/
    palette:
        primary: white
        accent: white
    features:
        - header.autohide
markdown_extensions:
    - def_list
    - md_in_html
    - tables
extra_javascript:
    - javascripts/katex.js
    - https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js
    - https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js
extra_css:
    - https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css
    - css/extra.css
plugins:
    - offline
    - blog:
        post_readtime: false
exclude_docs: |
    .ipynb_checkpoints
    .git
nav:
    - 'research.md'
    - 'publications.md'
    - 'teaching.md'
    - 'links.md'
    - Blog:
        - blog/index.md
    - 'index.md'
