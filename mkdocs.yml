site_name: Eduardo Furlan
site_author: Eduardo Furlan
site_url: https://efurlanm.github.io/
copyright: CC BY 4.0 License
repo_name: efurlanm
repo_url: https://github.com/efurlanm/
docs_dir: src
site_dir: docs
theme:
    name: material
    # squidfunk.github.io/mkdocs-material/setup/changing-the-colors/
    palette:
        primary: white
        accent: white
    font: false
    features:
        - header.autohide
plugins:
    - search
extra_css:
    - css/extra.css
    - https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css
extra_javascript:
    - javascripts/katex.js
    - https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js
    - https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js
markdown_extensions:
    - def_list
    - md_in_html
    - tables
    - pymdownx.snippets:
        check_paths: true
        base_path: src/include
exclude_docs: |
    .*
not_in_nav: |
    teaching/
    include/
    courses.md
nav:
    - research.md
    - teaching/index.md
    - notes.md
    - index.md
