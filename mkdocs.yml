site_name: Eduardo Furlan
site_author: Eduardo Furlan
copyright: CC BY 4.0 License
repo_name: efurlanm
repo_url: http://github.com/efurlanm/
docs_dir: docs-src
site_dir: docs
use_directory_urls: false  # need for inline html and dir navigation
theme:
    name: material
    palette:
# https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/
        primary: blue grey
        accent: blue grey
    features:
        - header.autohide
markdown_extensions:
    - def_list
    - md_in_html
    - tables
extra_css:
    - css/extra.css
exclude_docs: |
    .ipynb_checkpoints
    .git
nav:
    - 'publications.md'
    - 'research.md'
    - 'teaching.md'
    - 'links.md'
    - 'index.md'
