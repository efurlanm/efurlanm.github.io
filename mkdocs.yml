site_name: Eduardo Furlan
site_author: Eduardo Furlan
copyright: CC BY 4.0 License
repo_name: efurlanm
repo_url: http://github.com/efurlanm/
docs_dir: docs-src
site_dir: docs
#site_url: ""
use_directory_urls: false
theme:
    name: material
# https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/
    palette:
        primary: blue grey
        accent: blue grey
    features:
        - header.autohide
plugins:
    - offline
    - privacy
    - search
# 2024-03-16 There is a bug where mermaid will always be downloaded and installed, even if it is not used.
markdown_extensions:
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - def_list
    - md_in_html
    - tables
extra_css:
    - css/extra.css
exclude_docs: |
    .ipynb_checkpoints
    .git
